name: ci

on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test ./...

      - name: Benchmark smoke test
        run: go test -run ^$ -bench BenchmarkCreatePBKDF2 -benchtime=1x ./...
